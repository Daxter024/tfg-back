syntax = "proto3";

package com.agro.input.grpc;

option java_multiple_files = true;
option java_package = "com.agro.input.grpc";

service InputService {
  rpc CheckInputExists (InputIdRequest) returns (InputExistsResponse);
}

message InputIdRequest {
  string input_id = 1;
}

message InputExistsResponse {
  bool exists = 1;
}
