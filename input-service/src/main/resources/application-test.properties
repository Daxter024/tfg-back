# Test profile: Testcontainers boots Postgres but no Kafka broker; consumers
# and producers stay idle without spamming connection errors.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.listener.auto-startup=false

# Random gRPC port in tests to avoid clashes when running in parallel with
# the local dev server.
grpc.server.port=0
