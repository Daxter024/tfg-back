services:
  crop-db:
    image: postgres:14
    container_name: crop-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: crop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_crop_data:/var/lib/postgresql/data

  crop-service:
    build: .
    container_name: crop-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://crop-db:5432/crop_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8083
    depends_on:
      - crop-db

volumes:
  db_crop_data:
