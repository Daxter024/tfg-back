# Common properties
spring.application.name=terrain-service
server.port=${SERVER_PORT:8083}
# BBDD configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/terrain_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisDialect
# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
#Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.validate-on-migrate=true
logging.level.org.flywaydb=INFO
# gRPC Client Configuration
grpc.client.auth-service.address=static://auth-service:9091
grpc.client.auth-service.negotiation-type=plaintext
# gRPC Server Configuration
grpc.server.port=9093

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=terrain-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=com.agro.authservice.event.UserDeletedEvent:com.agro.terrainservice.event.UserDeletedEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Attachments (HU-TER-03)
attachments.storage.path=${ATTACHMENTS_STORAGE_PATH:./attachments}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# External cadastral services (HU-TER-05)
# Empty by default — el cliente devuelve Optional.empty() y la app cae a 404.
cadastro.api.base-url=${CADASTRO_API_URL:}
sigpac.api.base-url=${SIGPAC_API_URL:}