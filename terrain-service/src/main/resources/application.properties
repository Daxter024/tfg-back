# Common properties
spring.application.name=terrain-service
server.port=${SERVER_PORT:8083}
# BBDD configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/terrain_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisDialect
# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
#Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.validate-on-migrate=true
logging.level.org.flywaydb=INFO
# gRPC Client Configuration
grpc.client.auth-service.address=static://auth-service:9091
grpc.client.auth-service.negotiation-type=plaintext
# gRPC Server Configuration
grpc.server.port=9093