syntax = "proto3";

package com.agro.parcel.grpc;

option java_multiple_files = true;
option java_package = "com.agro.parcel.grpc";

// HU-TER-04: validacion de existencia de parcela. La consumiran season-,
// task- e iot-service antes de aceptar inserciones que referencien parcel_id.
service ParcelService {
  rpc CheckParcelExists (ParcelIdRequest) returns (ParcelExistsResponse);
}

message ParcelIdRequest {
  string parcel_id = 1;
}

message ParcelExistsResponse {
  bool exists = 1;
}
