# Solo usado por @ActiveProfiles("test"). H2 en modo PostgreSQL para que JPA
# pueda crear el esquema de prueba sin necesidad del servidor PostGIS real.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# H2 en modo PostgreSQL
spring.datasource.url=jdbc:h2:mem:terraintest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# H2 no entiende los tipos espaciales — usar dialecto vanilla H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Sin broker Kafka real en tests de contexto. Dejamos que la autoconfig cree
# KafkaTemplate (lo necesita EventPublisher) pero evitamos que el admin/listener
# bloqueen el arranque por no encontrar broker.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.admin.fail-fast=false

# gRPC server desactivado en tests
grpc.server.port=-1

# Cliente gRPC apunta a localhost solo para evitar resolución DNS de "auth-service"
grpc.client.auth-service.address=static://localhost:9091
grpc.client.auth-service.negotiation-type=plaintext
