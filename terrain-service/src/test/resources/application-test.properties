# Perfil de tests del terrain-service. Solo se usa cuando una clase declara
# @ActiveProfiles("test").

# Datasource: H2 en modo PostgreSQL para que JPA pueda manejar tipos UUID.
# OJO: H2 no tiene PostGIS, asi que cualquier prueba que ejecute SQL espacial
# debe usar Testcontainers (postgis/postgis:15-3.5) en su lugar.
spring.datasource.url=jdbc:h2:mem:terraintest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA: dejamos que H2 cree el esquema basico al vuelo, pero deshabilitamos
# Flyway porque las migraciones contienen sintaxis PostGIS / ENUMs propias de
# PostgreSQL que H2 no soporta.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Kafka: dejamos que la autoconfiguracion cree los beans pero impedimos que el
# admin/listener bloqueen el arranque por falta de broker.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.admin.fail-fast=false

# gRPC server desactivado en tests (puerto -1 lo deshabilita).
grpc.server.port=-1

# gRPC client: apunta a un host ficticio; los tests que ejerciten flujos gRPC
# deben mockear UserGrpcClient.
grpc.client.auth-service.address=static://localhost:9091
grpc.client.auth-service.negotiation-type=plaintext
