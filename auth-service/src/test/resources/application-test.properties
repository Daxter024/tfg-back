# Solo usado por @ActiveProfiles("test"). Evita el choque con la carpeta
# huerfana db/migration/dev/V1__create_user_table_dev.sql en el classpath.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# H2 en modo PostgreSQL para que JPA pueda crear tablas con tipos UUID/JSON.
spring.datasource.url=jdbc:h2:mem:authtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Sin broker Kafka real en tests de contexto. Dejamos que la autoconfig cree
# KafkaTemplate (lo necesita EventPublisher) pero evitamos que el admin/listener
# bloqueen el arranque por no encontrar broker.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.admin.fail-fast=false

# JWT (cualquier secret base64 sirve)
jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQ=
jwt.access-token.ttl-minutes=60
jwt.refresh-token.ttl-days=7

# gRPC server desactivado en tests (puerto 9091 puede chocar)
grpc.server.port=-1
