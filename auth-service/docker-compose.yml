services:

  auth-db:
    image: postgres:14
    container_name: auth-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_auth_data:/var/lib/postgresql/data

  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8083
      SPRING_PROFILES_ACTIVE: prod # Spring automaticamente elige el perfil prod
      JWT_SECRET: CambiarEnElFuturoEstaCl4veNoesParaProduccion219834
    depends_on:
      - auth-db

volumes:
  db_auth_data:
