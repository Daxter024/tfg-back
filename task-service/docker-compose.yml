####
## Move to root directory in the future
##
## Change db credentials for production
####
##
## NOTA: para que este compose funcione aislado necesita la red externa
## `agro-net` y los siguientes containers ya corriendo sobre ella:
##   - auth-service    (gRPC ValidateUser en 9091)
##   - terrain-service (gRPC CheckTerrainExists en 9093, REST en 8080)
##
## Kafka se levanta dentro de este mismo compose (broker en kafka:9092).
##
## Crear la red si no existe:
##   docker network create agro-net
####

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Modo KRaft (sin Zookeeper) — el contenedor "combined" actúa como
      # broker + controller. Sintaxis nativa del image apache/kafka.
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic auto-creation = on (default true) para que producers en cold-start
      # puedan empezar a publicar sin pre-crear los topics manualmente.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Tuning de réplica para single-node dev (default 3 causaría warnings).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - default
      - agro-net

  task-db:
    image: postgres:14
    container_name: task-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_task_data:/var/lib/postgresql/data
    networks:
      - default
      - agro-net

  task-service:
    build: .
    container_name: task-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://task-db:5432/task_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8084
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ATTACHMENTS_STORAGE_ROOT=/data/attachments
      - TERRAIN_SERVICE_URL=http://terrain-service:8080
    volumes:
      - task_attachments:/data/attachments
    depends_on:
      - task-db
      - kafka
    restart: always
    networks:
      - default
      - agro-net

volumes:
  db_task_data:
  task_attachments:

networks:
  agro-net:
    external: true
