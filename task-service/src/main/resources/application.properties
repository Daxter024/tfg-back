# Common properties
spring.application.name=task-service
server.port=${SERVER_PORT:8084}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Datasource (dev defaults; overridden by application-prod.properties via env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5436/task_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
logging.level.org.flywaydb=INFO

# Kafka (default to localhost for dev; prod uses SPRING_KAFKA_BOOTSTRAP_SERVERS env var)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=task-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=com.agro.authservice.event.UserDeletedEvent:com.agro.taskservice.event.UserDeletedEvent,com.agro.terrainservice.event.TerrainDeletedEvent:com.agro.taskservice.event.TerrainDeletedEvent,com.agro.inputservice.event.StockLowEvent:com.agro.taskservice.event.StockLowEvent,com.agro.iotservice.event.SensorAlertEvent:com.agro.taskservice.event.SensorAlertEvent
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=RECORD

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# gRPC clients
grpc.client.auth-service.address=${GRPC_AUTH_ADDRESS:static://localhost:9091}
grpc.client.auth-service.negotiation-type=plaintext
grpc.client.terrain-service.address=${GRPC_TERRAIN_ADDRESS:static://localhost:9093}
grpc.client.terrain-service.negotiation-type=plaintext

# Attachments storage (evidence files)
attachments.storage.root=${ATTACHMENTS_STORAGE_ROOT:./attachments}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Terrain REST endpoint (HU-TAR-03 — list terrains by user_id for role scoping)
terrain-service.base-url=${TERRAIN_SERVICE_URL:http://localhost:8080}

# Mail (degrade to in-app only if not configured — see NotificationService)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
