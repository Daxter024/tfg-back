# Test profile: avoid waiting on a real Kafka broker. Testcontainers boots
# Postgres but no broker; the consumers/producers stay idle without errors.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.listener.auto-startup=false

# Disable scheduler in tests by default (each test that exercises it switches it on)
spring.task.scheduling.pool.size=1
task.scheduler.enabled=false
