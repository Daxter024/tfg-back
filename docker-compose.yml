services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      - SERVER_PORT=9000
      - TERRAIN_SERVICE_URL=http://terrain-service:8080
      - CROP_SERVICE_URL=http://crop-service:8081
      - SEASON_SERVICE_URL=http://season-service:8082
      - AUTH_SERVICE_URL=http://auth-service:8083
    depends_on:
      - terrain-service
      - crop-service
      - season-service
      - auth-service

  terrain-db:
    image: postgis/postgis:15-3.5
    container_name: terrain-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: terrain_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_terrain_data:/var/lib/postgresql/data

  terrain-service:
    build: ./terrain-service
    container_name: terrain-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://terrain-db:5432/terrain_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8080
    depends_on:
      - terrain-db
  #    restart: on-failure

  crop-db:
    image: postgres:14
    container_name: crop-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: crop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_crop_data:/var/lib/postgresql/data

  crop-service:
    build: ./crop-service
    container_name: crop-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://crop-db:5432/crop_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8081
    depends_on:
      - crop-db

  season-db:
    image: postgres:14
    container_name: season-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: season_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_season_data:/var/lib/postgresql/data

  season-service:
    build: ./season-service
    container_name: season-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://season-db:5432/season_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8082
    depends_on:
      - season-db

  auth-db:
    image: postgres:14
    container_name: auth-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_auth_data:/var/lib/postgresql/data

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://auth-db:5432/auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8083
      - JWT_SECRET=CambiarEnElFuturoEstaCl4veNoesParaProduccion219834
    depends_on:
      - auth-db

volumes:
  db_terrain_data:
  db_crop_data:
  db_season_data:
  db_auth_data:
