services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      - SERVER_PORT=9000
      - TERRAIN_SERVICE_URL=http://terrain-service:8080
      - CROP_SERVICE_URL=http://crop-service:8081
      - SEASON_SERVICE_URL=http://season-service:8082
      - AUTH_SERVICE_URL=http://auth-service:8083
      - TASK_SERVICE_URL=http://task-service:8084
      - INPUT_SERVICE_URL=http://input-service:8085
    depends_on:
      - terrain-service
      - crop-service
      - season-service
      - auth-service
      - task-service
      - input-service

  kafka:
    # bitnami/kafka images stopped being publicly hosted in 2025 — switched to
    # the official apache/kafka image (KRaft mode, no Zookeeper). The
    # KAFKA_CFG_* sintaxis bitnami se sustituye por KAFKA_* nativa.
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic auto-creation = on para que productores en cold-start puedan
      # empezar a publicar sin pre-crear topics manualmente.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Tuning de replica para single-node dev (default 3 generaria warnings).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  terrain-db:
    image: postgis/postgis:15-3.5
    container_name: terrain-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: terrain_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_terrain_data:/var/lib/postgresql/data

  terrain-service:
    build: ./terrain-service
    container_name: terrain-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://terrain-db:5432/terrain_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8080
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - terrain-db
      - kafka
  #    restart: on-failure

  crop-db:
    image: postgres:14
    container_name: crop-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: crop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_crop_data:/var/lib/postgresql/data

  crop-service:
    build: ./crop-service
    container_name: crop-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://crop-db:5432/crop_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8081
    depends_on:
      - crop-db

  season-db:
    image: postgres:14
    container_name: season-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: season_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_season_data:/var/lib/postgresql/data

  season-service:
    build: ./season-service
    container_name: season-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://season-db:5432/season_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8082
    depends_on:
      - season-db

  auth-db:
    image: postgres:14
    container_name: auth-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_auth_data:/var/lib/postgresql/data

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://auth-db:5432/auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8083
      - JWT_SECRET=CambiarEnElFuturoEstaCl4veNoesParaProduccion219834
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - auth-db
      - kafka

  task-db:
    image: postgres:14
    container_name: task-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_task_data:/var/lib/postgresql/data

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
      - DB_URL=jdbc:postgresql://task-db:5432/task_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ATTACHMENTS_STORAGE_ROOT=/data/attachments
      - TERRAIN_SERVICE_URL=http://terrain-service:8080
    volumes:
      - task_attachments:/data/attachments
    depends_on:
      - task-db
      - kafka
      - auth-service
      - terrain-service

  input-db:
    image: postgres:14
    container_name: input-db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: input_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_input_data:/var/lib/postgresql/data

  input-service:
    build: ./input-service
    container_name: input-service
    ports:
      - "8085:8085"
      - "9096:9096"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8085
      - DB_URL=jdbc:postgresql://input-db:5432/input_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - input-db
      - kafka

  iot-db:
    image: postgres:14
    container_name: iot-db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: iot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_iot_data:/var/lib/postgresql/data

  iot-service:
    build: ./iot-service
    container_name: iot-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8086
      - DB_URL=jdbc:postgresql://iot-db:5432/iot_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - iot-db
      - kafka
      - auth-service
      - terrain-service

volumes:
  db_terrain_data:
  db_crop_data:
  db_season_data:
  db_auth_data:
  db_task_data:
  task_attachments:
  db_input_data:
  db_iot_data:
