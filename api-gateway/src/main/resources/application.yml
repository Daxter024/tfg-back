server:
  port: ${SERVER_PORT:9001}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8085}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
                statusCodes: 500,502,503,504,505

        - id: season-service
          uri: ${SEASON_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/season/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: seasonService
                fallbackUri: forward:/fallback/season
                statusCodes: 500,502,503,504,505

        - id: crop-service
          uri: ${CROP_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/crop/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: cropService
                fallbackUri: forward:/fallback/crop
                statusCodes: 500,502,503,504,505

        - id: terrain-service
          uri: ${TERRAIN_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/terrain/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: terrainService
                fallbackUri: forward:/fallback/terrain
                statusCodes: 500,502,503,504,505
