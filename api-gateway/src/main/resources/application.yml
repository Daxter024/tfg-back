server:
  port: ${SERVER_PORT:9001}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8085}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Rutas admin del auth-service (requieren JWT). Deben ir ANTES que la ruta
        # genérica /auth/** para que el predicado más específico gane.
        - id: auth-admin-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/auth/users/**,/auth/audit/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
                statusCodes: 500,502,503,504,505

        - id: auth-service-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: authService
                fallbackUri: forward:/fallback/auth
                statusCodes: 500,502,503,504,505

        - id: season-service
          uri: ${SEASON_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/season/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: seasonService
                fallbackUri: forward:/fallback/season
                statusCodes: 500,502,503,504,505

        - id: crop-service
          uri: ${CROP_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/crop/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: cropService
                fallbackUri: forward:/fallback/crop
                statusCodes: 500,502,503,504,505

        - id: terrain-service
          uri: ${TERRAIN_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/terrain/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: terrainService
                fallbackUri: forward:/fallback/terrain
                statusCodes: 500,502,503,504,505

        - id: task-service
          uri: ${TASK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/task/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: taskService
                fallbackUri: forward:/fallback/task
                statusCodes: 500,502,503,504,505

        - id: notification-service-route
          uri: ${TASK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: notificationService
                fallbackUri: forward:/fallback/task
                statusCodes: 500,502,503,504,505

        - id: input-service
          uri: ${INPUT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/input/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: inputService
                fallbackUri: forward:/fallback/input
                statusCodes: 500,502,503,504,505

        # iot-service admin paths (sensor / threshold / alert) — JWT required.
        - id: iot-sensor-route
          uri: ${IOT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/sensor/**,/api/threshold/**,/api/alert/**
          filters:
            - StripPrefix=1
            - JwtValidation
            - name: CircuitBreaker
              args:
                name: iotService
                fallbackUri: forward:/fallback/iot
                statusCodes: 500,502,503,504,505

        # Device ingest path — NO JwtValidation. Devices authenticate inside
        # iot-service via the X-Device-Key header against BCrypt hashes
        # (DeviceKeyAuthFilter). This is a deliberate exception to the
        # MICROSERVICES-RELATIONSHIPS §5.3 default — documented in plan §13.
        - id: iot-ingest-route
          uri: ${IOT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/ingest/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: iotIngest
                fallbackUri: forward:/fallback/iot
                statusCodes: 500,502,503,504,505
# For newer versions
#  cloud:
