logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    org.springframework.context.annotation: DEBUG
    reactor.netty: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info