# Test profile: Testcontainers boots Postgres but no Kafka broker; consumers
# and producers stay idle without spamming connection errors.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.listener.auto-startup=false

# gRPC clients disabled in tests (no server is reachable).
grpc.client.auth-service.address=static://localhost:9091
grpc.client.auth-service.negotiation-type=plaintext
grpc.client.terrain-service.address=static://localhost:9093
grpc.client.terrain-service.negotiation-type=plaintext
