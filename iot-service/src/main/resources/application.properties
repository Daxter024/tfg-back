# Common properties
spring.application.name=iot-service
server.port=${SERVER_PORT:8086}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Datasource (dev defaults; overridden in prod via env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5438/iot_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
logging.level.org.flywaydb=INFO

# Kafka (default to localhost for dev; prod uses SPRING_KAFKA_BOOTSTRAP_SERVERS env var)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=iot-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=com.agro.terrainservice.event.TerrainDeletedEvent:com.agro.iotservice.event.TerrainDeletedEvent,com.agro.authservice.event.UserDeletedEvent:com.agro.iotservice.event.UserDeletedEvent
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=RECORD

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# gRPC clients (dev: localhost). iot-service is gRPC client only (no server).
grpc.client.auth-service.address=static://localhost:9091
grpc.client.auth-service.negotiation-type=plaintext
grpc.client.terrain-service.address=static://localhost:9093
grpc.client.terrain-service.negotiation-type=plaintext
